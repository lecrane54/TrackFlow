name: Release Android → Maven Central

on:
  push:
    tags:
      - 'v*'          # triggers on v4.0.0, v4.1.0-beta1, etc.

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Validate tag matches gradle version
        run: |
          GRADLE_VERSION=$(grep 'trackflow.version' gradle.properties | cut -d'=' -f2)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GRADLE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match gradle.properties ($GRADLE_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          ./gradlew \
            :trackflow-core:publishMavenPublicationToMavenCentralRepository \
            :trackflow-debug:publishMavenPublicationToMavenCentralRepository \
            :trackflow-provider-firebase:publishMavenPublicationToMavenCentralRepository \
            :trackflow-provider-amplitude:publishMavenPublicationToMavenCentralRepository \
            :trackflow-provider-mixpanel:publishMavenPublicationToMavenCentralRepository \
            --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
