name: iOS CI

on:
  push:
    branches: [ master, v2 ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-ios-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-ios-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile iOS targets
        run: |
          ./gradlew :trackflow-core:compileKotlinIosArm64 --no-daemon
          ./gradlew :trackflow-core:compileKotlinIosSimulatorArm64 --no-daemon

      - name: Build iOS framework
        run: ./gradlew :trackflow-core:assembleXCFramework --no-daemon
