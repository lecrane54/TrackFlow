name: iOS CI

on:
  push:
    branches: [ master, v2 ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-ios-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-ios-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: testapp-ios/Pods
          key: pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Generate podspecs
        run: ./gradlew podspec --no-daemon

      - name: Generate dummy frameworks
        run: ./gradlew generateDummyFramework --no-daemon

      - name: Build all iOS frameworks (arm64)
        run: |
          ./gradlew \
            :trackflow-core:compileKotlinIosArm64 \
            :trackflow-provider-firebase-ios:compileKotlinIosArm64 \
            :trackflow-provider-amplitude-ios:compileKotlinIosArm64 \
            :trackflow-provider-mixpanel-ios:compileKotlinIosArm64 \
            :trackflow-provider-adobe-analytics-ios:compileKotlinIosArm64 \
            :trackflow-provider-adobe-edge-ios:compileKotlinIosArm64 \
            --no-daemon

      - name: Build all iOS frameworks (simulator arm64)
        run: |
          ./gradlew \
            :trackflow-core:compileKotlinIosSimulatorArm64 \
            :trackflow-provider-firebase-ios:compileKotlinIosSimulatorArm64 \
            :trackflow-provider-amplitude-ios:compileKotlinIosSimulatorArm64 \
            :trackflow-provider-mixpanel-ios:compileKotlinIosSimulatorArm64 \
            :trackflow-provider-adobe-analytics-ios:compileKotlinIosSimulatorArm64 \
            :trackflow-provider-adobe-edge-ios:compileKotlinIosSimulatorArm64 \
            --no-daemon

      - name: Build provider frameworks for simulator
        run: |
          ./gradlew \
            :trackflow-core:syncFramework \
            :trackflow-provider-firebase-ios:syncFramework \
            :trackflow-provider-amplitude-ios:syncFramework \
            :trackflow-provider-mixpanel-ios:syncFramework \
            :trackflow-provider-adobe-analytics-ios:syncFramework \
            :trackflow-provider-adobe-edge-ios:syncFramework \
            -Pkotlin.native.cocoapods.platform=iphonesimulator \
            -Pkotlin.native.cocoapods.archs=arm64 \
            -Pkotlin.native.cocoapods.configuration=Release \
            --no-daemon

      - name: Pod install for test app
        run: |
          cd testapp-ios
          pod install

      - name: Build test app
        run: |
          xcodebuild -workspace testapp-ios/TrackFlowTestApp.xcworkspace \
            -scheme TrackFlowTestApp \
            -sdk iphonesimulator \
            -arch arm64 \
            -configuration Release \
            -derivedDataPath build \
            OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES \
            build
